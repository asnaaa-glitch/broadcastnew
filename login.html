<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Broadcast Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon"><i class="fa-solid fa-bullhorn"></i></div>
        <div>
          <h1>Broadcast Pro</h1>
          <p>Dashboard Management System</p>
        </div>
      </div>

      <h2 class="login-title">Selamat Datang 👋</h2>
      <p class="login-sub">Masuk ke akun kamu untuk melanjutkan</p>

      <!-- Alert error -->
      <div class="alert" id="alertBox" style="display:none">
        <i class="fa-solid fa-circle-xmark"></i>
        <span id="alertMsg">Username atau password salah</span>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate>
        <div class="field-group">
          <label for="username">Email / Username</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="Masukkan email kamu" autocomplete="username" />
          </div>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Masukkan password kamu" autocomplete="current-password" />
            <button type="button" class="toggle-pw" id="togglePw">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText">Masuk</span>
          <i class="fa-solid fa-spinner fa-spin" id="btnSpinner" style="display:none"></i>
        </button>
      </form>

      <p class="login-footer">
  Broadcast Pro v2.0 &nbsp;·&nbsp; Powered by Google Sheets<br><br>
  Belum punya akun? <a href="register.html" style="color: var(--purple2);">Daftar di sini</a>
</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="login.js"></script>
</body>
</html>
